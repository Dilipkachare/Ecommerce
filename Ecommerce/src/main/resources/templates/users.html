<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h2>All Users</h2>
<a href="/add-user">Add User</a>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Action</th>
    </tr>

    <tr th:each="u : ${users}">
        <td th:text="${u.id}"></td>
        <td th:text="${u.name}"></td>
        <td th:text="${u.email}"></td>
        <td th:text="${u.phone}"></td>
        <td>
            <a th:href="@{'/edit-user/' + ${u.id}}">Edit</a>
            <a th:href="@{'/delete-user/' + ${u.id}}">Delete</a>
        </td>
    </tr>
</table>

</body>
</html>
